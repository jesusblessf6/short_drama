# 文生图提示词模板（7段式）
# 每个镜头的文生图提示词必须按此模板填写

# 模板变量:
#   {shot_type}      - 景别: 远景/全景/中景/近景/特写
#   {character}      - 角色完整描述（从角色卡复制，不能省略）
#   {action}         - 主体动作/状态（静态瞬间）
#   {environment}    - 环境场景
#   {mood}           - 情绪氛围
#   {style}          - 视觉风格
#   {lighting}       - 光影效果

template: "{shot_type}，{character}，{action}，{environment}，{mood}，{style}，{lighting}"

# 示例
example: >-
  中景，商三官（鹅蛋脸细长眉眼尾微翘左眉尾小痣靛蓝圆领袍束冠黑巾纤瘦），
  站立抚琴，赵府偏厅红木琴台烛光摇曳，
  沉静中暗藏紧张，古风写实工笔画风，暖黄烛光侧光阴影分明

# 负面提示词（每个镜头必须包含）
negative_prompt: "毁容，面部扭曲，肢体变形，多余手指，模糊，低质量，水印"

# 铁律
rules:
  - "描述静态瞬间，不能包含动态动词"
  - "角色描述必须完整重复，不能写'同上'"
  - "一镜一事"
  - "适度语义模糊，避免过细描述"
  - "第一帧必须静态"
